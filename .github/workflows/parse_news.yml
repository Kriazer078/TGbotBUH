name: Parse News

on:
  workflow_dispatch: # Позволяет запускать скрипт вручную из интерфейса GitHub

jobs:
  parse-and-save:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # или та версия, которую вы используете
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run News Parser
        env:
          # Передаем содержимое firebase_credentials.json из секретов GitHub
          FIREBASE_CREDENTIALS_JSON: ${{ secrets.FIREBASE_CREDENTIALS_JSON }}
        run: python scripts/parse_news.py
